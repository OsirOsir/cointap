<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="coin" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a3142"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full bleed background (works for maskable icons too) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#tile)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#gloss)"/>

  <!-- Bottom coin -->
  <g filter="url(#glow)">
    <circle cx="195" cy="297" r="102" fill="url(#coin)"/>
    <circle cx="195" cy="297" r="102" fill="none" stroke="rgba(247,147,26,0.4)" stroke-width="7"/>
    <circle cx="195" cy="297" r="77" fill="none" stroke="rgba(247,147,26,0.25)" stroke-width="4" stroke-dasharray="10 10"/>
  </g>

  <!-- Top coin with "1" -->
  <g filter="url(#glow)">
    <circle cx="317" cy="215" r="112" fill="url(#coin)"/>
    <circle cx="317" cy="215" r="112" fill="none" stroke="rgba(255,200,80,0.7)" stroke-width="9"/>
    <circle cx="317" cy="215" r="87" fill="none" stroke="rgba(247,147,26,0.35)" stroke-width="4"/>
    <text x="317" y="255" text-anchor="middle"
      font-family="'Space Grotesk', system-ui, sans-serif"
      font-size="112" font-weight="700" fill="#fbbf24">1</text>
  </g>
</svg>
