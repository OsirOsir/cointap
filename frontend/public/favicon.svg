<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ctTile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="ctGloss" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="ctCoin" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a3142"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
  </defs>

  <!-- Squircle tile -->
  <rect x="4" y="4" width="92" height="92" rx="24" ry="24" fill="url(#ctTile)"/>
  <rect x="4" y="4" width="92" height="92" rx="24" ry="24" fill="url(#ctGloss)"/>
  <rect x="4.5" y="4.5" width="91" height="91" rx="23.5" ry="23.5"
    fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Bottom coin -->
  <circle cx="38" cy="58" r="20" fill="url(#ctCoin)"/>
  <circle cx="38" cy="58" r="20" fill="none" stroke="rgba(247,147,26,0.4)" stroke-width="1.5"/>
  <circle cx="38" cy="58" r="15" fill="none" stroke="rgba(247,147,26,0.25)" stroke-width="0.8" stroke-dasharray="2 2"/>

  <!-- Top coin with "1" -->
  <circle cx="62" cy="42" r="22" fill="url(#ctCoin)"/>
  <circle cx="62" cy="42" r="22" fill="none" stroke="rgba(255,200,80,0.7)" stroke-width="1.8"/>
  <circle cx="62" cy="42" r="17" fill="none" stroke="rgba(247,147,26,0.35)" stroke-width="0.8"/>
  <text x="62" y="50" text-anchor="middle"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="22" font-weight="700" fill="#fbbf24">1</text>
</svg>
